<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1000" height="260" viewBox="0 0 1000 260" role="img" aria-label="GitHub profile banner">
  <style>
    :root { --bg1:#071428; --bg2:#082a3a; --accent:#2be7d9; --muted:#9fb7be; --card:#08121a; }
    .bg { fill: url(#grad); }
    .glow { fill: none; stroke: rgba(43,231,217,0.12); stroke-width:80; filter: blur(30px); }
    .wave { fill: rgba(255,255,255,0.02); }
    .name { font-family: "Segoe UI", Roboto, Helvetica, Arial, sans-serif; font-weight:800; fill:#eafffb; font-size:44px; letter-spacing:0.6px; }
    .role { font-family: "Segoe UI", Roboto, Helvetica, Arial, sans-serif; font-size:16px; fill:var(--muted); }
    .skill { font-family: "Segoe UI", Roboto, Helvetica, Arial, sans-serif; font-size:20px; fill:var(--accent); font-weight:700; }
    .pulse { animation: float 6s ease-in-out infinite; transform-origin: 50% 50%; }
    @keyframes float {
      0% { transform: translateY(0px); }
      50% { transform: translateY(-6px); }
      100% { transform: translateY(0px); }
    }
    /* small underline reveal */
    .underline { stroke: var(--accent); stroke-width:3; stroke-linecap:round; stroke-dasharray: 200; stroke-dashoffset:200; animation: draw 1s ease-out 0.4s forwards; }
    @keyframes draw { to { stroke-dashoffset:0; } }
  </style>

  <defs>
    <linearGradient id="grad" x1="0" x2="1">
      <stop offset="0" stop-color="#041022"/>
      <stop offset="1" stop-color="#062a3a"/>
    </linearGradient>
    <filter id="gblur" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="12" result="blur" />
    </filter>
  </defs>

  <!-- background -->
  <rect class="bg" width="1000" height="260" rx="12" ry="12"/>
  <!-- soft glow -->
  <circle class="glow" cx="820" cy="40" r="120" opacity="0.35" />
  <circle class="glow" cx="120" cy="200" r="80" opacity="0.18" />

  <!-- subtle waves -->
  <g transform="translate(0,180)" opacity="0.45">
    <path class="wave" d="M0,40 C150,0 300,80 450,40 C600,0 750,80 1000,40 L1000,80 L0,80 Z"/>
  </g>

  <!-- left: text block -->
  <g transform="translate(48,52)" class="pulse">
    <text class="name">deryaipeker</text>
    <text class="role" y="44">Embedded AI • STM32 • TinyML</text>

    <!-- underline -->
    <line class="underline" x1="0" y1="68" x2="320" y2="68" vector-effect="non-scaling-stroke"/>

    <!-- animated skill carousel: three text elements cycling opacity -->
    <g transform="translate(0,110)">
      <text class="skill" id="s1">DS‑CNN · MFCC · FreeRTOS</text>
      <text class="skill" id="s2" opacity="0">LCNN · Anti‑Spoofing · AES</text>
      <text class="skill" id="s3" opacity="0">I2S · DMA · STM32H7</text>

      <!-- cycle animation using SMIL -->
      <animate xlink:href="#s1" attributeName="opacity" values="1;0;0" dur="6s" repeatCount="indefinite" begin="0s"/>
      <animate xlink:href="#s2" attributeName="opacity" values="0;1;0" dur="6s" repeatCount="indefinite" begin="2s"/>
      <animate xlink:href="#s3" attributeName="opacity" values="0;0;1" dur="6s" repeatCount="indefinite" begin="4s"/>
    </g>
  </g>

  <!-- right: floating device / avatar card -->
  <g transform="translate(680,48)" opacity="0.95" >
    <rect x="-8" y="-8" width="220" height="140" rx="12" ry="12" fill="#071826" stroke="rgba(255,255,255,0.03)"/>
    <!-- miniature PCB / chip icon -->
    <g transform="translate(40,24)" >
      <rect width="70" height="70" rx="8" ry="8" fill="#071b2a" stroke="#12323a"/>
      <rect x="12" y="12" width="46" height="46" rx="6" ry="6" fill="#082a36"/>
      <circle cx="35" cy="35" r="12" fill="#0fd6c8" opacity="0.12"/>
      <circle cx="35" cy="35" r="6" fill="#2be7d9" />
      <!-- pins -->
      <rect x="-6" y="24" width="6" height="6" fill="#0fd6c8"/>
      <rect x="76" y="24" width="6" height="6" fill="#0fd6c8"/>
      <rect x="34" y="-6" width="6" height="6" fill="#0fd6c8"/>
      <rect x="34" y="76" width="6" height="6" fill="#0fd6c8"/>
    </g>

    <!-- small stats -->
    <g transform="translate(120,34)">
      <text x="0" y="12" font-size="12" fill="#bfecec" font-family="Segoe UI">Uptime</text>
      <text x="0" y="30" font-size="22" fill="#e6fff9" font-weight="700" font-family="Segoe UI">99.9%</text>
      <text x="0" y="60" font-size="10" fill="#93bfc0" font-family="Segoe UI">Edge‑deployed • On‑device</text>
    </g>
  </g>

  <!-- bottom floating dots for style -->
  <g transform="translate(100,220)" opacity="0.5">
    <circle cx="0" cy="0" r="3" fill="#2be7d9"/>
    <circle cx="20" cy="0" r="2" fill="#7fece6"/>
    <circle cx="40" cy="0" r="5" fill="#1fbfb6" opacity="0.7"/>
    <circle cx="62" cy="0" r="2" fill="#7fece6"/>
    <circle cx="86" cy="0" r="3" fill="#2be7d9"/>
  </g>
</svg>