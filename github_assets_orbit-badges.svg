<?xml version="1.0" encoding="UTF-8"?>
<svg viewBox="0 0 1000 260" xmlns="http://www.w3.org/2000/svg" width="1000" height="260" role="img" aria-label="Orbiting tech badges">
  <defs>
    <linearGradient id="bg" x1="0" x2="1"><stop offset="0" stop-color="#041022"/><stop offset="1" stop-color="#062a3a"/></linearGradient>
    <filter id="glow"><feGaussianBlur stdDeviation="10" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  </defs>
  <rect width="100%" height="100%" fill="url(#bg)" rx="12"/>
  <!-- center chip -->
  <g transform="translate(150,130)">
    <rect x="-56" y="-36" width="112" height="72" rx="12" fill="#071826" stroke="#0fd6c8" stroke-opacity="0.12"/>
    <rect x="-40" y="-20" width="80" height="40" rx="8" fill="#082a36"/>
    <circle cx="0" cy="0" r="12" fill="#2be7d9" opacity="0.14"/>
    <circle cx="0" cy="0" r="6" fill="#2be7d9"/>
  </g>

  <!-- orbits group -->
  <g transform="translate(150,130)" filter="url(#glow)">
    <!-- orbit ring -->
    <circle r="90" fill="none" stroke="rgba(255,255,255,0.03)"/>
    <g id="badges">
      <!-- badge template: a circle with letter -->
      <g transform="rotate(0)">
        <g transform="translate(90,0)">
          <circle r="18" fill="#0fd6c8"/>
          <text x="0" y="6" font-size="12" text-anchor="middle" fill="#041022" font-weight="700">AI</text>
        </g>
      </g>
      <g transform="rotate(120)">
        <g transform="translate(90,0)">
          <circle r="18" fill="#7fece6"/>
          <text x="0" y="6" font-size="12" text-anchor="middle" fill="#041022" font-weight="700">DSP</text>
        </g>
      </g>
      <g transform="rotate(240)">
        <g transform="translate(90,0)">
          <circle r="18" fill="#1fbfb6"/>
          <text x="0" y="6" font-size="12" text-anchor="middle" fill="#041022" font-weight="700">TF</text>
        </g>
      </g>
    </g>

    <!-- rotate the badges group -->
    <animateTransform xlink:href="#badges" attributeName="transform" attributeType="XML" type="rotate" from="0" to="360" dur="14s" repeatCount="indefinite"/>
  </g>

  <!-- right text -->
  <g transform="translate(320,52)">
    <text x="0" y="0" font-size="32" fill="#eafffb" font-weight="800">deryaipeker</text>
    <text x="0" y="36" font-size="14" fill="#9fb7be">Embedded AI • STM32 • TinyML</text>
  </g>
</svg>